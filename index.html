<title>کانفیگ سینگ باکس شماره ٢</title>
<style>
    body {
        font-family: 'Tahoma', sans-serif;
        text-align: center;
        direction: rtl;
        background: linear-gradient(135deg, #0d0d0d, #121212);
        color: #ffffff;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
    }

    .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .header {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 5px;
        opacity: 0;
        transform: translateY(-30px);
        animation: fadeSlideIn 1s forwards;
    }
    .header:first-child { animation-delay: 0.2s; }
    .header:last-child { animation-delay: 0.4s; }
    .header a { text-decoration: none; color: #ffcc00; }
    .header a:hover { text-decoration: underline; color: #ffd700; }

    .status-text {
        font-size: 20px;
        margin-bottom: 10px;
        opacity: 0;
        transform: translateY(-50px);
        animation: slideInOnce 1s forwards 0.6s;
    }
    .info-text {
        font-size: 16px;
        margin-bottom: 20px;
        opacity: 0;
        transform: translateY(-50px);
        animation: slideInOnce 1s forwards 0.8s;
    }

    @keyframes fadeSlideIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInOnce {
        to { opacity: 1; transform: translateY(0); }
    }

    .redirect-link {
        font-size: 22px;
        font-weight: bold;
        color: #00d9ff;
        text-decoration: none;
        display: block;
        margin-bottom: 20px;
        opacity: 0;
        transform: translateY(-50px);
        animation: slideInOnce 1s forwards 1s;
        transition: all 0.4s ease-in-out;
    }
    .redirect-link:hover {
        color: #ffffff;
        text-shadow: 0 0 20px rgba(0,217,255,1),0 0 40px rgba(0,136,204,0.6);
        transform: scale(1.07) rotate(-1deg);
    }

    .left-container {
        position: fixed;
        bottom: 70px;
        left: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        z-index: 10;
    }

    .telegram-box, .github-box, .visit-box {
        border-radius: 10px;
        font-weight: bold;
        text-align: center;
        width: 140px;
        padding: 10px;
        transition: all 0.3s ease;
    }

    /* Telegram */
    .telegram-box {
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(270deg, #00d9ff, #0088cc, #00d9ff);
        background-size: 600% 600%;
        color: white;
        animation: pulseGradient 3s ease infinite;
        box-shadow: 0 0 10px rgba(0,217,255,0.6), 0 0 20px rgba(0,136,204,0.3);
    }
    .telegram-box img { width: 22px; height: 22px; margin-left: 5px; }
    .telegram-box:hover { transform: scale(1.12) rotate(-2deg); box-shadow: 0 0 25px rgba(0,217,255,1),0 0 50px rgba(0,136,204,0.8); }

    /* Github */
    .github-box {
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(270deg, #6e5494, #9b59b6, #6e5494);
        background-size: 600% 600%;
        color: white;
        animation: pulseGradient 3s ease infinite;
        box-shadow: 0 0 10px rgba(155,89,182,0.6),0 0 20px rgba(110,84,148,0.3);
        cursor: pointer;
        text-decoration: none;
    }
    .github-box img { width: 22px; height: 22px; margin-left: 5px; }
    .github-box:hover { transform: scale(1.12) rotate(2deg); box-shadow: 0 0 25px rgba(155,89,182,1),0 0 50px rgba(110,84,148,0.8); }

    /* Visit count */
    .visit-box {
        background: rgba(0,0,0,0.5);
        color: white;
        padding: 6px 12px;
        font-size: 14px;
        box-shadow: 0 0 5px rgba(0,255,255,0.3);
        animation: pulseGradient 4s ease infinite;
    }
    .visit-box:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0,255,255,0.7); }

    @keyframes pulseGradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .footer { 
        background: rgba(0,0,0,0.7); 
        padding: 10px; 
        font-size: 16px; 
        text-align: center; 
        color: #bbb; 
        margin-top: auto; 
    }
    .footer a { 
        color: #ffcc00; 
        text-decoration: none; 
        margin: 0 10px; 
    }
    .footer a:hover { 
        text-decoration: underline; 
    }

    @media (max-width: 768px) {
        .redirect-link { font-size: 18px; }
        .header { font-size: 20px; }
        .status-text { font-size: 18px; }
        .info-text { font-size: 14px; }
        .telegram-box, .github-box, .visit-box { width: 120px; font-size: 13px; }
        .telegram-box img, .github-box img { width: 18px; height: 18px; }
    }
    @media (max-width: 480px) {
        body { padding: 10px; }
        .redirect-link { font-size: 16px; }
        .header { font-size: 18px; }
        .status-text { font-size: 16px; }
        .info-text { font-size: 14px; }
        .telegram-box, .github-box, .visit-box { width: 110px; font-size: 12px; padding: 6px; }
    }

    /* ===== بازی (مپی شده از کد دوم) ===== */
    :root {
        --game-height: 55vh;
        --game-max-height: 400px;
        --font-base: 1rem;
    }

    * { box-sizing: border-box; }

    .game-container {
        background: linear-gradient(270deg, #ff2a6d, #ff8c00, #ff2a6d);
        background-size: 600% 600%;
        animation: pulseGradient 3s ease infinite;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(255,42,109,0.7), 0 0 40px rgba(255,140,0,0.4);
        margin-bottom: 20px;
        width: 90%;
        max-width: 380px;
        height: var(--game-height);
        max-height: var(--game-max-height);
        position: relative;
        overflow: hidden;
        cursor: pointer;
        opacity: 0;
        transform: translateY(-30px);
        animation: fadeSlideIn 1s forwards 0.2s;
    }

    .game-canvas {
        width: 100%;
        height: 100%;
        position: relative;
        background: linear-gradient(to bottom, #87CEEB 0%, #98D8E8 70%, #228B22 100%);
        border-radius: 15px;
        overflow: hidden;
    }

    .player {
        position: absolute;
        font-size: 7vw;
        max-font-size: 32px;
        transition: none;
        user-select: none;
        left: 12%;
        top: 50%;
        transform: translateY(-50%);
    }

    .pipe {
        position: absolute;
        background: linear-gradient(#2ecc71, #27ae60);
        width: 15vw;
        max-width: 60px;
        bottom: 0;
        border-radius: 10px 10px 0 0;
        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .score {
        position: absolute;
        top: 8px;
        right: 12px;
        font-size: 6vw;
        max-font-size: 26px;
        font-weight: bold;
        color: #fff;
        text-shadow: 2px 2px 4px #000;
        z-index: 10;
    }

    .lives {
        position: absolute;
        top: 8px;
        left: 12px;
        font-size: 6vw;
        max-font-size: 26px;
        color: #ff4444;
        text-shadow: 2px 2px 4px #000;
        z-index: 10;
    }

    .game-over {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.9);
        color: #ff2a6d;
        padding: 15px 25px;
        border-radius: 15px;
        font-weight: bold;
        font-size: 4.5vw;
        max-font-size: 18px;
        text-shadow: 0 0 8px #fff;
        display: none;
        z-index: 100;
        text-align: center;
        line-height: 1.4;
    }

    .game-over small {
        font-size: 3.5vw;
        max-font-size: 14px;
        display: block;
        margin-top: 8px;
        color: #ffcc00;
    }

    .explosion {
        position: absolute;
        font-size: 10vw;
        max-font-size: 45px;
        pointer-events: none;
        animation: explode 0.8s forwards;
        z-index: 99;
    }

    @keyframes explode {
        0% { opacity: 1; transform: scale(0.3) rotate(0deg); }
        100% { opacity: 0; transform: scale(2) rotate(360deg); }
    }

    .game-text {
        margin-top: 8px;
        font-size: 3.8vw;
        max-font-size: 15px;
        font-weight: bold;
        color: #000;
        text-shadow: 0 0 4px rgba(255,255,255,0.7);
    }

    @media (max-width: 480px) {
        :root { --game-height: 50vh; --game-max-height: 320px; }
        .game-container { width: 95%; }
    }
</style>
</head>
<body>
<div class="content">

    <!-- بازی آسان (مپی شده) -->
    <div class="game-container" id="gameContainer">
        <div class="game-canvas" id="gameCanvas">
            <div class="score" id="score">0</div>
            <div class="lives" id="lives">❤️❤️❤️</div>
            <div class="player" id="player">🚀</div>
            <div class="game-over" id="gameOver">
                بازی تمام شد! 🎮<br>
                <small>دوباره کلیک کن</small>
            </div>
        </div>
        <div class="game-text">لمس کن تا بپری! 👆</div>
    </div>

    <div class="header">کانال تلگرامی <a href="https://T.me/sinavm" target="_blank">SiNAVM</a></div>
    <div class="header">کانفیگ سینگ باکس شماره ٢</div>

    <div class="status-text">در حال انتقال کانفیگ...</div>
    <div class="info-text">اگر بعد از ٣ ثانیه انجام نشد، روی لینک زیر کلیک کنید:</div>

    <a class="redirect-link" href="sing-box://import-remote-profile?url=https://raw.githubusercontent.com/sinavm/SVM/main/@SiNAVM#2️⃣@𝗦𝗶𝗡𝗔𝗩𝗠 👈🏻کانال تلگرام">
        وارد کردن دستی کانفیگ
    </a>
</div>

<div class="left-container">
    <a class="telegram-box" href="https://T.me/sinavm" target="_blank">
        <img src="https://sinavm.github.io/sinavm/logo/telegram.png" alt="Telegram Logo">
        کانال تلگرام
    </a>

    <a class="github-box" href="https://github.com/sinavm" target="_blank">
        <img src="https://sinavm.github.io/sinavm/logo/github-mark.png" alt="Github Logo">
        Github
    </a>

    <div class="visit-box">بازدید کل: <span id="total-visit-count">...</span></div>
</div>

<!-- فوتر با لینک‌های قانونی (مپی شده) -->
<div class="footer">
    <a href="https://sinavm.github.io/sinavm/legal_pages/about.html">درباره ما</a> |
    <a href="https://sinavm.github.io/sinavm/legal_pages/privacy.html">حریم خصوصی</a> |
    <a href="https://sinavm.github.io/sinavm/legal_pages/terms.html">شرایط</a>
</div>

<script>
// بازدید شمار
fetch('https://page-views.count1.workers.dev')
    .then(r => r.text())
    .then(data => { document.getElementById("total-visit-count").innerText = data; })
    .catch(e => console.error(e));

// بازی آسان: فقط مانع پایین + 3 جان
const canvas = document.getElementById('gameCanvas');
const player = document.getElementById('player');
const gameOverScreen = document.getElementById('gameOver');
const scoreDisplay = document.getElementById('score');
const livesDisplay = document.getElementById('lives');

let gameActive = false;
let gravity = 0.3;
let lift = -8;
let velocity = 0;
let posY = 150;
let speed = 1.5;
let pipes = [];
let score = 0;
let lives = 3;
let frame = 0;
let gameLoop;
let lastCrashY = 0;

function startGame() {
    gameActive = true;
    gameOverScreen.style.display = 'none';
    pipes.forEach(p => p.elem.remove());
    pipes = [];
    score = 0;
    speed = 1.5;
    lives = 3;
    posY = canvas.offsetHeight / 2 - 50;
    velocity = 0;
    scoreDisplay.textContent = '0';
    livesDisplay.textContent = '❤️❤️❤️';
    frame = 0;
    updateSizes();
    loop();
}

function loseLife() {
    lives--;
    createExplosion(60, lastCrashY);
    
    if (lives > 0) {
        posY = lastCrashY - 20;
        velocity = lift * 0.8;
        livesDisplay.textContent = '❤️'.repeat(lives);
    } else {
        gameActive = false;
        cancelAnimationFrame(gameLoop);
        gameOverScreen.style.display = 'block';
    }
}

function createExplosion(x, y) {
    const exp = document.createElement('div');
    exp.className = 'explosion';
    exp.innerText = '💥';
    exp.style.left = (x - 20) + 'px';
    exp.style.top = (y - 20) + 'px';
    canvas.appendChild(exp);
    setTimeout(() => exp.remove(), 800);
}

function createPipe() {
    const height = 80 + Math.random() * 120;
    const pipe = document.createElement('div');
    pipe.className = 'pipe';
    pipe.style.height = height + 'px';
    pipe.style.right = '-80px';
    canvas.appendChild(pipe);
    pipes.push({ elem: pipe, x: canvas.offsetWidth, height: height });
}

function jump() {
    if (!gameActive) { startGame(); return; }
    velocity = lift;
}

canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); });

function updateSizes() {
    const width = canvas.offsetWidth;
    player.style.fontSize = Math.min(width * 0.08, 32) + 'px';
    document.querySelectorAll('.pipe').forEach(p => {
        p.style.width = Math.min(width * 0.15, 60) + 'px';
    });
}
window.addEventListener('resize', updateSizes);

function loop() {
    if (!gameActive) return;

    velocity += gravity;
    posY += velocity;
    player.style.top = posY + 'px';
    lastCrashY = posY;

    if (posY < 10) { posY = 10; velocity = 0; }

    if (posY > canvas.offsetHeight - 40) {
        loseLife();
        return;
    }

    frame++;
    if (frame % 140 === 0) createPipe();

    pipes.forEach((pipe, i) => {
        pipe.x -= speed;
        pipe.elem.style.right = (canvas.offsetWidth - pipe.x) + 'px';

        if (!pipe.passed && pipe.x < 80) {
            pipe.passed = true;
            score++;
            scoreDisplay.textContent = score;
            speed = Math.min(speed + 0.15, 3.5);
        }

        if (pipe.x < -80) {
            pipe.elem.remove();
            pipes.splice(i, 1);
        }

        if (pipe.x < 100 && pipe.x > 20) {
            const playerBottom = posY + 35;
            if (playerBottom > canvas.offsetHeight - pipe.height) {
                loseLife();
            }
        }
    });

    gameLoop = requestAnimationFrame(loop);
}

// پیام شروع
setTimeout(() => {
    const msg = document.createElement('div');
    msg.innerText = 'آسون! 👆 لمس کن';
    msg.style.cssText = `
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        color: #fff; font-weight: bold; font-size: 4.5vw;
        max-font-size: 18px; text-shadow: 0 0 10px #000;
        z-index: 20; background: rgba(0,0,0,0.5);
        padding: 10px 20px; border-radius: 10px;
    `;
    canvas.appendChild(msg);
    setTimeout(() => msg.remove(), 3000);
}, 500);

updateSizes();
</script>
</body>
</html>
