name: "Let's sinavm!"

on:
  workflow_dispatch:
  schedule:
    - cron: '*/60 * * * *'  # هر 60 دقیقه

concurrency:
  group: "sinavm"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install Dependencies for HiddifyCli
        run: |
          sudo apt-get update
          sudo apt-get install -y curl tar

      - name: Run Get.php
        run: |
          php -d display_errors get.php

      - name: Run Clash API
        run: |
          docker run -d -p 6756:6756 dreamacro/clash --port 6756
          sleep 10

      - name: Run Config Test
        run: |
          php -d display_errors config-test.php || true

      - name: Run Duplicate Removal
        run: |
          php -d display_errors duplicate.php

      - name: Check Changes
        run: |
          git status

      - name: Commit and Push Changes
        run: |
          git config --global user.email "sina.bb2006@gmail.com"
          git config --global user.name "sinavm"
          git config credential.helper store
          for i in {1..3}; do
            git pull --rebase
            git add -A
            git commit -m "🥷 Servers Updated - $(TZ='Asia/Tehran' date '+%Y-%m-%d %H:%M:%S')" --allow-empty
            git push && break || sleep 5
          done
